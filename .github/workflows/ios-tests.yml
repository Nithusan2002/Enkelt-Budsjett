name: iOS Tests

on:
  pull_request:
    paths:
      - "SporOkonomi/**"
      - "SporOkonomiTests/**"
      - "SporOkonomiUITests/**"
      - "SporOkonomi.xcodeproj/**"
      - ".github/workflows/ios-tests.yml"
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "SporOkonomi.xcodeproj" \
            -scheme "SporOkonomi" \
            -destination "platform=iOS Simulator,OS=latest,name=iPhone 16" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO
