name: iOS Tests

on:
  pull_request:
    paths:
      - "SporOkonomi/**"
      - "SporOkonomiTests/**"
      - "SporOkonomiUITests/**"
      - "SporOkonomi.xcodeproj/**"
      - ".github/workflows/ios-tests.yml"
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log Xcode and simulator environment
        run: |
          xcodebuild -version
          echo
          xcodebuild -showsdks
          echo
          xcrun simctl list runtimes
          echo
          xcrun simctl list devices available
          echo
          xcodebuild -showdestinations \
            -project "SporOkonomi.xcodeproj" \
            -scheme "SporOkonomi"

      - name: Select available simulator destination
        id: simulator
        shell: bash
        run: |
          DESTINATION=$(
            xcodebuild -showdestinations \
              -project "SporOkonomi.xcodeproj" \
              -scheme "SporOkonomi" 2>/dev/null \
            | awk -F '[{},]' '
                /platform:iOS Simulator/ {
                  name=""; os="";
                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /name:/) {
                      value = $i;
                      sub(/^.*name: */, "", value);
                      name = value;
                    }
                    if ($i ~ /OS:/) {
                      value = $i;
                      sub(/^.*OS: */, "", value);
                      os = value;
                    }
                  }
                  if (name != "" && os != "") {
                    print "platform=iOS Simulator,OS=" os ",name=" name;
                    exit
                  }
                }
              '
          )

          if [ -z "$DESTINATION" ]; then
            echo "No available iOS Simulator destination found on this runner."
            exit 1
          fi

          echo "Using destination: $DESTINATION"
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "SporOkonomi.xcodeproj" \
            -scheme "SporOkonomi" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO
