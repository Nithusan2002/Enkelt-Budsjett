name: Claude Release Notes

on:
  push:
    tags:
      - 'v*'

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits since last tag
        id: commits
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREVIOUS_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release notes with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Du skriver App Store-oppdateringstekst for Enkelt Budsjett, en norsk personøkonomi-app.

            Her er endringene i denne versjonen:
            ${{ steps.commits.outputs.commits }}

            Skriv en kort og varm App Store-oppdateringstekst på norsk bokmål (maks 4 setninger).
            - Fokuser på hva brukeren får, ikke tekniske detaljer
            - Ikke nevn interne refaktoreringer, tester eller dokumentasjon
            - Tonen skal være enkel og ikke-moraliserende
            - Ikke bruk emojier

            Svar kun med selve teksten, ingen overskrifter eller forklaringer.

      - name: Create GitHub Release with notes
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.claude.outputs.response }}
